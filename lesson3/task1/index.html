<script>
    // String
    const stringType = "Число";
    console.log(typeof stringType);
    // Number
    const numberType = 123;
    console.log(typeof numberType);
    // Boolean
    const booleanType = false;
    console.log(typeof booleanType);
    // Bigint
    const BigintType = 24n;
    console.log(typeof BigintType);
    // symbol
    const sumbolType = Symbol("id");
    console.log(typeof sumbolType);
    // null
    const nullType = null;
    console.log(typeof nullType);
    // Undefaind
    const undefaindTyp = 21;
    console.log(typeof undefaindType);
</script>
